                          <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب معدل الـ LMD لجميع التخصصات</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            background: white;
            margin: 20px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: var(--dark-color);
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--dark-color);
            color: white;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
        }
        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-add { background-color: var(--primary-color); color: white; }
        .btn-add:hover { background-color: #2980b9; }
        .btn-calc { background-color: var(--success-color); color: white; width: 100%; padding: 14px; font-size: 16px; margin-top: 15px; }
        .btn-calc:hover { background-color: #27ae60; }
        .btn-delete { background-color: var(--danger-color); color: white; padding: 6px 12px; }
        .btn-delete:hover { background-color: #c0392b; }
        
        .actions-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: none;
        }
        .pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #fff; }
            td { border: none; position: relative; padding-left: 50%; text-align: right; display: flex; justify-content: space-between; align-items: center; }
            td:before { content: attr(data-label); font-weight: bold; color: var(--dark-color); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مُحاكي معدلات نظام LMD الجامعي</h2>
    <p class="subtitle">صالح لجميع الكليات والتخصصات (علوم، آداب، طب، هندسة... إلخ)</p>
    
    <div class="actions-bar">
        <button class="btn btn-add" onclick="addRow()">➕ إضافة مادة جديدة</button>
    </div>
